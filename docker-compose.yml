services:
  postgres:
    image: postgres:17-alpine
    container_name: travel-map-postgres
    environment:
      POSTGRES_DB: travel_map
      POSTGRES_USER: travel_map
      POSTGRES_PASSWORD: travel_map
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_map -d travel_map"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: travel-map-backend
    environment:
      APP_ENV: local
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://travel_map:travel_map@postgres:5432/travel_map?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: travel-map-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
